<!--
  COMPONENT: Podcast
  Two-column layout: content left, player card visual right.

  VARIABLES TO CHANGE:
  - Eyebrow text: "The Podcast"
  - Headline: "500+ Episodes of Real Talk"
  - Description: the .body-large paragraph
  - Stats: numbers and labels in .podcast-stats
  - CTA button: href and text in .btn-primary
  - Card title: "The Tracy Harris Podcast" in .podcast-card-title
  - Card subtitle: "Tracy Harris" in .podcast-card-subtitle
  - Episode time: "24:18" in .podcast-time

  NOTES:
  - Background is --canvas.
  - Waveform bars are generated by reveal.js (podcast waveform section).
  - Grid: 1 col mobile, 1.1fr/0.9fr at 768px+.
  - Add id="podcast" to the section if used as a scroll target.
-->

<section class="podcast" id="podcast">
  <div class="podcast-inner">
    <div class="podcast-content reveal">
      <p class="eyebrow">The Podcast</p>
      <h2 class="headline-section">500+ Episodes of <em>Real</em> Talk</h2>
      <p class="body-large">Honest conversations about building a business that gives you freedom, not just another job. Strategy, mindset, and stories from the trenches.</p>
      <div class="podcast-stats">
        <div>
          <div class="podcast-stat-number">500+</div>
          <div class="podcast-stat-label">Episodes</div>
        </div>
        <div>
          <div class="podcast-stat-number">4,100+</div>
          <div class="podcast-stat-label">Monthly Downloads</div>
        </div>
      </div>
      <a href="#" class="btn-primary">Listen Now</a>
    </div>

    <div class="podcast-visual reveal reveal-delay-2">
      <div class="podcast-card">
        <div class="podcast-card-top">
          <div class="podcast-artwork">
            <svg class="podcast-artwork-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </div>
          <div>
            <div class="podcast-card-title">The Tracy Harris Podcast</div>
            <div class="podcast-card-subtitle">Tracy Harris</div>
          </div>
        </div>
        <div class="podcast-waveform" id="podcastWaveform"></div>
        <div class="podcast-player-row">
          <button class="podcast-play-btn" aria-label="Play episode">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </button>
          <span class="podcast-time">24:18</span>
        </div>
      </div>
    </div>
  </div>
</section>
