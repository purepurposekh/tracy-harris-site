<!-- ============================================
     COMPONENT: Full-Photo Hero (Kara Parker style)
     Design: v4b design system

     VARIABLES TO SWAP:
     - Background image (currently speaking.jpg)
     - Eyebrow text (role descriptors)
     - Display name
     - Social media links and icons
     - Nav links (left group, right group)

     DEPENDENCIES:
     - tokens.css (design tokens, base styles)
     - sections-extra.css (.hero-fullphoto-* styles)
     - Google Fonts: EB Garamond, DM Sans
     - reveal.js (scroll reveal animations)

     NOTES:
     - Full viewport height, photo as background
     - Bottom gradient fade for text legibility
     - Minimal top nav, split left/right
     ============================================ -->

<section class="hero-fullphoto">
  <!-- Background image -->
  <div class="hero-fullphoto-bg">
    <img
      src="images/tracy/web/speaking.jpg"
      alt="Tracy Harris speaking on stage"
    />
  </div>

  <!-- Top nav (split left/right) -->
  <nav class="hero-fullphoto-nav">
    <div class="hero-fullphoto-nav-group">
      <a href="#">Home</a>
      <a href="#services">Services</a>
    </div>
    <div class="hero-fullphoto-nav-group">
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </div>
  </nav>

  <!-- Bottom content -->
  <div class="hero-fullphoto-content reveal">
    <p class="hero-fullphoto-eyebrow">Educator &middot; Speaker &middot; Author</p>
    <h1 class="hero-fullphoto-name">Tracy Harris</h1>

    <!-- Social icons -->
    <div class="hero-fullphoto-socials">
      <!-- Instagram -->
      <a href="https://instagram.com/tracyharrisco" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="5"/>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
        </svg>
      </a>
      <!-- YouTube -->
      <a href="#" aria-label="YouTube">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19.13C5.12 19.56 12 19.56 12 19.56s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.43z"/>
          <polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"/>
        </svg>
      </a>
      <!-- LinkedIn -->
      <a href="#" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
          <rect x="2" y="9" width="4" height="12"/>
          <circle cx="4" cy="4" r="2"/>
        </svg>
      </a>
      <!-- Podcast / Mic icon -->
      <a href="#" aria-label="Podcast">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </a>
    </div>
  </div>
</section>
